name: release

on:
  push:
    branches: [main, next]

env:
  HUSKY: 0

permissions:
  contents: write # push tags, GitHub releases
  issues: write # semantic-release comments
  pull-requests: write # semantic-release comments
  id-token: write # npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs full history and tags
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          cache: yarn
          node-version-file: .nvmrc
          # Do NOT set registry-url: it writes an _authToken line into .npmrc
          # which prevents npm from attempting the OIDC token exchange.

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Do NOT set NPM_TOKEN — any value, even an empty string, disables
          # OIDC trusted publishing and makes npm attempt classic token auth.
        # TODO: drop --dry-run once trusted publishers are configured on npmjs.com
        run: npx multi-semantic-release --dry-run
